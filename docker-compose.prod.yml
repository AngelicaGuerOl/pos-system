name: novapos-store

services:
  db:
    ports: !reset []
    volumes:
      - pos_postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  backend:
    ports: !reset []
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:?DB_NAME is required}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:?DB_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:?JWT_EXPIRATION_MINUTES is required}
      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:?BOOTSTRAP_ADMIN_ENABLED is required}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:?BOOTSTRAP_ADMIN_USERNAME is required}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?BOOTSTRAP_ADMIN_PASSWORD is required}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -S --spider http://localhost:8080/api/auth/me 2>&1 | grep -Eq 'HTTP/[0-9.]+ (200|401|403)'"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: ./pos-frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api
    environment: !reset []
    ports: !override
      - "${NOVAPOS_BIND_ADDRESS:-127.0.0.1}:${NOVAPOS_FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  pgadmin:
    profiles:
      - dev-tools

volumes:
  pos_postgres_prod_data:
    name: pos_postgres_prod_data
