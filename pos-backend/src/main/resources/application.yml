spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

  application:
    name: pos-backend

  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

app:
  open-food-facts:
    base-url: ${OPEN_FOOD_FACTS_BASE_URL:https://world.openfoodfacts.org}
    user-agent: ${OPEN_FOOD_FACTS_USER_AGENT:NovaPOS/1.0 (contacto@example.com)}
  bootstrap:
    admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:true}
      username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:}

springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    doc-expansion: none
    filter: true
    display-request-duration: true
    disable-swagger-default-url: true
